name: Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  knip:
    name: check

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ubuntu-24.04-arm-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ubuntu-24.04-arm-node-

      - name: Install pnpm dependencies
        id: install-pnpm
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile

      - name: Build packages
        id: build-packages
        run: pnpm --color=always --stream build:production
        continue-on-error: true

      - name: Build packages (retry)
        id: build-packages-2
        if: steps.build-packages.outcome == 'failure'
        run: pnpm --color=always --stream build:production
        continue-on-error: true

      - name: Build packages (retry 2)
        if: steps.build-packages-2.outcome == 'failure'
        run: pnpm --color=always --stream build:production

      - name: Check types
        run: pnpm --color=always --stream type:check

      - name: Check linters
        run: pnpm --color=always --stream lint:check

      - name: Check Knip
        run: pnpm --color=always --stream knip:check
