name: Release

on:
  push:
    tags:
      - v*

permissions: {}

jobs:
  release:
    name: release

    runs-on: ubuntu-24.04-arm
    environment: publishing

    env:
      VITE_PRESERVE_MODULES: "false"

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v7

      - name: Check if package version matches
        run: test "${GITHUB_REF_NAME}" = "v$(yq -r .version package.json)"

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ubuntu-24.04-arm-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ubuntu-24.04-arm-node-

      - name: Install pnpm dependencies
        id: install-pnpm
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile

      - name: Build packages
        id: build-packages
        run: pnpm --color=always --stream build
        continue-on-error: true

      - name: Build packages (retry)
        id: build-packages-2
        if: steps.build-packages.outcome == 'failure'
        run: pnpm --color=always --stream build
        continue-on-error: true

      - name: Build packages (retry 2)
        if: steps.build-packages-2.outcome == 'failure'
        run: pnpm --color=always --stream build

      - name: Pack packages
        run: pnpm --color=always --stream pack

      - name: Publish npm packages
        id: publish-npm
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) dist_tag=next;;
            *) dist_tag=latest;;
          esac
          if [[ -n ${NPM_TOKEN:-} ]]; then
            NODE_AUTH_TOKEN="${NPM_TOKEN}" pnpm --color=always publish -r \
              --no-git-checks \
              --tag ${dist_tag}
          else
            NPM_CONFIG_PROVENANCE=true pnpm --color=always publish -r \
              --no-git-checks \
              --tag ${dist_tag}
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish npm packages (retry)
        id: publish-npm-2
        if: steps.publish-npm.outcome == 'failure'
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) dist_tag=next;;
            *) dist_tag=latest;;
          esac
          if [[ -n ${NPM_TOKEN:-} ]]; then
            NODE_AUTH_TOKEN="${NPM_TOKEN}" pnpm --color=always publish -r \
              --no-git-checks \
              --tag ${dist_tag}
          else
            NPM_CONFIG_PROVENANCE=true pnpm --color=always publish -r \
              --no-git-checks \
              --tag ${dist_tag}
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish npm packages (retry 2)
        if: steps.publish-npm-2.outcome == 'failure'
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) dist_tag=next;;
            *) dist_tag=latest;;
          esac
          if [[ -n ${NPM_TOKEN:-} ]]; then
            NODE_AUTH_TOKEN="${NPM_TOKEN}" pnpm --color=always publish -r \
              --no-git-checks \
              --tag ${dist_tag}
          else
            NPM_CONFIG_PROVENANCE=true pnpm --color=always publish -r \
              --no-git-checks \
              --tag ${dist_tag}
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          upload-release-assets: false

      - name: Normalize SBOM filename
        shell: bash
        run: |
          for f in *.tgz; do
            mv sbom.spdx.json "${f%.tgz}-spdx.json"
          done

      - name: Make checksums
        shell: bash
        run: |
          for f in *.tgz *-spdx.json; do
            sha256sum "$f" | tee "$f.sha256"
          done

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: |-
            *.tgz
            *.tgz.sha256
            *-spdx.json
            *-spdx.json.sha256
